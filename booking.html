<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickFix - Book Now</title>
</head>
<body>
    <header>
        <h1>🚀 QuickFix - Book Your Fix Now</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="booking.html">Book Now</a></li>
        </ul>
    </nav>
    <main>
        <section id="booking-intro">
            <h2>Book Help in Minutes</h2>
            <p>Fill the form below. We'll confirm and send a pro ASAP!</p>
        </section>
        <section id="booking-form">
            <form action="#" method="post">
                <p>
                    <label for="full-name">Full Name:</label>
                    <input type="text" id="full-name" name="full-name" required>
                </p>
                <p>
                    <label for="service">Service Needed:</label>
                    <select id="service" name="service" required>
                        <option value="">Select a service</option>
                        <option value="electricians">Electricians</option>
                        <option value="gardeners">Gardeners</option>
                        <option value="mechanics">Mechanics</option>
                        <option value="extras">Plumbing/Phone Repairs/Extras</option>
                    </select>
                </p>
                <p>
                    <label for="date">Preferred Date:</label>
                    <input type="date" id="date" name="date" required>
                </p>
                <p>
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" required>
                </p>
                <p>
                    <label for="details">Problem Details:</label>
                    <textarea id="details" name="details" rows="6" placeholder="Describe the issue..." required></textarea>
                </p>
                <button type="submit">Submit Booking</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&amp;copy; 2026 QuickFix. | Phone: 072-072-3595 | Email: tshedzafoster@gmail.com</p>
    </footer>
</body>
</html>
